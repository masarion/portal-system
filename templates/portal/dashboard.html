{% extends 'base.html' %}
{% block title %}ポータル - 業務管理{% endblock %}
{% block nav_portal %}active{% endblock %}

{% block content %}
<div class="page-header">
  <h2><i class="bi bi-grid-3x3-gap-fill me-2 text-primary"></i>業務ポータル</h2>
  <p class="text-muted mt-1 mb-0" style="font-size:.875rem;">利用する業務システムを選択してください</p>
</div>

<div class="row g-3">
  <div class="col-md-6 col-lg-4">
    <a href="{% url 'shift:project_list' %}" class="app-card">
      <div class="app-icon" style="background:#eff6ff;">
        <i class="bi bi-calendar3 text-primary"></i>
      </div>
      <div>
        <div>シフト管理</div>
        <div class="app-meta">シフト希望収集・案件管理・一覧表出力</div>
      </div>
      <i class="bi bi-chevron-right ms-auto text-muted"></i>
    </a>
  </div>
  <div class="col-md-6 col-lg-4">
    <a href="https://kintai-system-aj1s.onrender.com/management/" target="_blank" rel="noopener" class="app-card">
      <div class="app-icon" style="background:#f0fdf4;">
        <i class="bi bi-clock-history" style="color:#16a34a;"></i>
      </div>
      <div>
        <div>勤怠管理</div>
        <div class="app-meta">出退勤打刻・勤怠一覧・スタッフ管理</div>
      </div>
      <i class="bi bi-box-arrow-up-right ms-auto text-muted" style="font-size:.75rem;"></i>
    </a>
  </div>
</div>

<div class="row g-3 mt-1">
  <div class="col-md-6 col-lg-4">
    <div class="card p-3">
      <div class="d-flex align-items-center gap-3">
        <div class="stat-icon" style="background:#eff6ff;color:var(--primary);">
          <i class="bi bi-calendar3"></i>
        </div>
        <div>
          <div class="stat-value text-primary">{{ shift_project_count }}</div>
          <div class="stat-label">シフト案件数</div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

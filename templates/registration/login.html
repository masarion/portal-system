<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 業務ポータル</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.2); padding: 2.5rem; width: 100%; max-width: 400px; }
    .login-logo { width: 56px; height: 56px; background: linear-gradient(135deg, #1e40af, #2563eb); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; color: #fff; margin: 0 auto 1.25rem; }
    .form-control { border-radius: 8px; padding: 0.65rem 0.9rem; font-size: 0.9rem; }
    .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .btn-login { background: linear-gradient(135deg, #1e40af, #2563eb); border: none; border-radius: 8px; font-weight: 600; padding: 0.65rem; font-size: 0.95rem; }
    .btn-login:hover { box-shadow: 0 4px 16px rgba(37,99,235,.4); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><i class="bi bi-grid-3x3-gap-fill"></i></div>
    <h1 class="text-center fw-700 mb-1" style="font-size:1.3rem;font-weight:700;">業務ポータル</h1>
    <p class="text-center text-muted small mb-4">管理者ログイン</p>

    {% if form.errors %}
    <div class="alert alert-danger rounded-3 py-2 small mb-3">
      <i class="bi bi-exclamation-circle me-1"></i>ユーザー名またはパスワードが正しくありません
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold small">ユーザー名</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">パスワード</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 text-white">
        <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
      </button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</body>
</html>
